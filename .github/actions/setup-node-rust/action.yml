name: Setup Node and Rust
description: Node.js (with npm cache) and stable Rust toolchain for Lunote CI/Release
inputs:
  node-version:
    description: Node.js major version
    required: false
    default: "22"
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
