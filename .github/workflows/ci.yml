# Continuous integration — checkout and compile only (no validation gates).
name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux Tauri dependencies
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri backend
        run: cargo build --manifest-path src-tauri/Cargo.toml

  build-matrix:
    name: Build · ${{ matrix.label }}
    needs: build
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            label: Linux · Ubuntu 24.04
          - runner: windows-2022
            platform: windows
            label: Windows · Server 2022
          - runner: windows-latest
            platform: windows
            label: Windows · latest
          - runner: windows-11-arm
            platform: windows
            label: Windows · ARM64
          - runner: macos-14
            platform: macos
            label: macOS 14 · arm64
          - runner: macos-15
            platform: macos
            label: macOS 15 · arm64
          - runner: macos-latest
            platform: macos
            label: macOS · latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
