# Continuous integration — runs on every push and pull request.
name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Locale / menu scripts are OS-agnostic; run once on Linux.
  locale-and-scripts:
    name: Locale & menu validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run version:check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build UI locales from corpus
        run: python3 scripts/build_ui_locales.py

      - name: Sync shell menu from UI locales
        run: python3 scripts/sync_shell_menu_from_ui.py

      - name: Export menu canonical + validate UI/shell menu sync
        run: |
          python3 scripts/export_menu_canonical.py
          python3 scripts/export_menu_rust_manifest.py
          python3 scripts/validate_menu_i18n_sync.py
          python3 scripts/validate_menu_runtime.py

      - name: Validate locale truth (UI + shell, no merge masking)
        run: python3 scripts/validate_locale.py --strict --check-min-translated

      - name: Validate shell locale schema
        run: python3 scripts/validate_shell_locale.py

      - name: Lint (allow existing warnings)
        run: npm run lint -- --max-warnings 100

  # Compile and typecheck on multiple OS / runner versions (no installers).
  # continue-on-error: one platform failing does not cancel the rest.
  build:
    name: Build · ${{ matrix.label }}
    needs: locale-and-scripts
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — glibc / WebKit baseline vs newer distro
          - runner: ubuntu-22.04
            platform: linux
            label: Linux · Ubuntu 22.04
          - runner: ubuntu-24.04
            platform: linux
            label: Linux · Ubuntu 24.04
          # Windows — Server 2022 baseline vs rolling image
          - runner: windows-2022
            platform: windows
            label: Windows · Server 2022
          - runner: windows-latest
            platform: windows
            label: Windows · latest
          - runner: windows-11-arm
            platform: windows
            label: Windows · ARM64
          # macOS — Apple Silicon vs recent releases
          - runner: macos-14
            platform: macos
            label: macOS 14 · arm64
          - runner: macos-15
            platform: macos
            label: macOS 15 · arm64
          - runner: macos-latest
            platform: macos
            label: macOS · latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run version:check

      - name: Typecheck and build frontend
        run: npm run build

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  # Locale checks must pass; platform builds may fail independently.
  ci-gate:
    name: CI gate
    needs: [locale-and-scripts, build]
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    steps:
      - name: Require locale and script checks
        run: |
          if [ "${{ needs.locale-and-scripts.result }}" != "success" ]; then
            echo "Locale/menu validation failed."
            exit 1
          fi

      - name: Report platform build results
        run: |
          echo "Platform build job result: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::warning::One or more platform builds failed. See the build matrix for details."
          fi
