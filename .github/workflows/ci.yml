# CI — compile on every push/PR; auto-release after compile when:
#   • a v* tag is pushed, or
#   • main/master push changes version.json (uses v{version} from version.json).
name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux Tauri dependencies
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri backend
        run: cargo build --manifest-path src-tauri/Cargo.toml

  locale-check:
    name: Locale & menu pipeline
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install dependencies
        run: npm ci

      - name: Locale & menu pipeline (validation + committed outputs)
        uses: ./.github/actions/locale-pipeline
        with:
          run-validation: "true"
          check-git-clean: "true"

  test-contracts:
    name: Contract harnesses
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install dependencies
        run: npm ci

      - name: Run contract harnesses
        run: npm run test:contracts

      - name: QA production parity
        run: npm run validate:qa-parity

      - name: Desktop Playwright matrix contract
        run: node scripts/test/run-case/run-desktop-playwright-matrix-contract-tests.mjs

  # Cross-platform compile smoke — mirrors release targets (see release-build.yml):
  #   Linux deb · Windows x86_64 + ARM64 · macOS arm64
  build-matrix:
    name: Build · ${{ matrix.label }}
    needs: build
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            label: Linux · deb
          - runner: windows-2022
            platform: windows
            label: Windows · x86_64
          - runner: windows-11-arm
            platform: windows
            label: Windows · ARM64
          - runner: macos-14
            platform: macos
            label: macOS · arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  plan-release:
    name: Plan release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      tag: ${{ steps.plan.outputs.tag }}
      release_ref: ${{ steps.plan.outputs.release_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to publish a release
        id: plan
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/release/plan_release.mjs

  release:
    name: Publish GitHub Release
    needs: [build, plan-release]
    if: needs.plan-release.outputs.should_release == 'true'
    uses: ./.github/workflows/release-build.yml
    with:
      release_ref: ${{ needs.plan-release.outputs.release_ref }}
      tag: ${{ needs.plan-release.outputs.tag }}
      draft: false
    secrets: inherit
    permissions:
      contents: write
