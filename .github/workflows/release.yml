# Manual release entry — same pipeline as CI tag releases.
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.5.0). Tag must already exist on GitHub.'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release-build.yml
    with:
      release_ref: ${{ format('refs/tags/{0}', github.event.inputs.tag) }}
      tag: ${{ github.event.inputs.tag }}
      draft: ${{ github.event.inputs.draft }}
    secrets: inherit
