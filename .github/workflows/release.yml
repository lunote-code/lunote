# Release pipeline — builds signed installers for macOS, Windows, and Linux,
# then publishes a GitHub Release with all artifacts attached.
#
# Triggers:
#   - Push a version tag matching v* (e.g. vX.Y.Z)
#   - Manual workflow_dispatch with a tag input (optional draft release)
#
# Optional GitHub Secrets (see docs/packaging-strategy.md):
#   Windows: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD, WINDOWS_CERTIFICATE_THUMBPRINT
#   Linux:   GPG_PRIVATE_KEY, GPG_KEY_ID, GPG_PASSPHRASE
#   macOS:   ad-hoc signing only (no secrets required)
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. vX.Y.Z). Required for manual runs.'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

jobs:
  validate-release:
    name: Validate release tag & version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches version.json
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi
          VERSION="${TAG#v}"
          CANONICAL=$(node -p "require('./version.json').version")
          if [ "$VERSION" != "$CANONICAL" ]; then
            echo "Tag $TAG does not match version.json ($CANONICAL)"
            echo "Update version.json, then run: npm run version:sync"
            exit 1
          fi
          echo "Tag $TAG matches version.json ($CANONICAL)"

      - name: Check version sync across manifests
        run: npm run version:check

  # --- macOS: arm64 (Apple Silicon) DMG ---
  build-dmg:
    needs: validate-release
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install dependencies
        run: npm ci

      - name: Sync app version
        run: npm run version:sync

      - name: Build signed DMG (arm64)
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri:bundle:dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunote-dmg-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # --- Windows: x86_64 + arm64 MSI ---
  build-msi:
    needs: validate-release
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            arch: x86_64
            artifact: lunote-msi-x64
          - runner: windows-11-arm
            arch: aarch64
            artifact: lunote-msi-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install dependencies
        run: npm ci

      - name: Sync app version
        run: npm run version:sync

      - name: Import Windows code signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host '[release] WINDOWS_CERTIFICATE not configured; MSI will be unsigned'
            exit 0
          }
          ./scripts/import-windows-certificate.ps1 `
            -CertificateBase64 $env:WINDOWS_CERTIFICATE `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD

      - name: Build MSI (${{ matrix.arch }})
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: npm run tauri:bundle:msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # --- Linux: .deb built on 22.04 for stable glibc baseline ---
  build-deb:
    needs: validate-release
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux build dependencies
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install GPG (DEB signing)
        run: sudo apt-get install -y gnupg

      - name: Install dependencies
        run: npm ci

      - name: Sync app version
        run: npm run version:sync

      - name: Build and sign DEB
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: npm run tauri:bundle:deb

      - name: Collect DEB release assets
        run: |
          mkdir -p release-assets/deb
          cp src-tauri/target/release/bundle/deb/*.deb release-assets/deb/
          cp src-tauri/target/release/bundle/deb/*.deb.asc release-assets/deb/ 2>/dev/null || true

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunote-deb
          path: release-assets/deb/*
          if-no-files-found: error

  # --- Verify release bundles on additional runner OS versions (smoke, no upload) ---
  verify-build:
    needs: validate-release
    continue-on-error: true
    name: Verify · ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            label: Linux · Ubuntu 24.04
          - runner: windows-latest
            platform: windows
            label: Windows · latest
          - runner: macos-latest
            platform: macos
            label: macOS · latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node and Rust
        uses: ./.github/actions/setup-node-rust

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        uses: ./.github/actions/install-linux-tauri-deps

      - name: Install dependencies
        run: npm ci

      - name: Sync app version
        run: npm run version:sync

      - name: cargo check (Tauri)
        run: cargo check --manifest-path src-tauri/Cargo.toml

  publish:
    name: Publish GitHub Release
    needs: [validate-release, build-dmg, build-msi, build-deb, verify-build]
    if: always() && needs.validate-release.result == 'success' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Report build job results
        run: |
          echo "build-dmg: ${{ needs.build-dmg.result }}"
          echo "build-msi: ${{ needs.build-msi.result }}"
          echo "build-deb: ${{ needs.build-deb.result }}"
          echo "verify-build: ${{ needs.verify-build.result }}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-assets
          merge-multiple: true

      - name: Require at least one release artifact
        run: |
          shopt -s globstar nullglob
          files=(release-assets/**/*.dmg release-assets/**/*.msi release-assets/**/*.deb release-assets/**/*.deb.asc)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts were produced; refusing to publish an empty release."
            exit 1
          fi
          printf 'Release artifacts (%s):\n' "${#files[@]}"
          printf ' - %s\n' "${files[@]}"

      - name: List release assets
        run: find release-assets -type f | sort | xargs ls -lah

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Lunote ${{ steps.tag.outputs.value }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.deb.asc
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `.dmg` (arm64) | Built on macOS 14 |
            | Windows (x86_64) | `.msi` (x64) | Intel/AMD PCs · Windows Server 2022 runner |
            | Windows (ARM64) | `.msi` (arm64) | Snapdragon / ARM PCs · `windows-11-arm` runner |
            | Linux (Debian/Ubuntu) | `.deb` (+ optional `.deb.asc`) | Built on Ubuntu 22.04 |

            ### macOS first launch

            If Gatekeeper shows an unidentified-developer warning: move Lunote to **Applications**, then **Right-click → Open**. If needed: `xattr -cr /Applications/Lunote.app`

            ### CI coverage

            Every push/PR runs builds on Ubuntu 22.04/24.04, Windows Server 2022/latest, and macOS 14/15/latest. Release additionally smoke-checks Ubuntu 24.04, Windows latest, and macOS latest before publishing. Platform build jobs may fail independently; this release includes only the artifacts that succeeded.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
