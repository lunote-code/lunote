<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lunote — local-first Markdown notes and PKM app with wiki links, backlinks, knowledge graph, and offline storage." />
    <meta name="keywords" content="markdown, notes, PKM, knowledge management, wiki links, backlinks, local-first, offline, open source, Obsidian alternative" />
    <title>Lunote — Local-first Markdown Notes</title>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          var dark = t === null ? true : t === 'dark'
          var p = localStorage.getItem('themePreset') || 'github'
          if (p !== 'idea' && p !== 'dim') p = 'github'
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
          document.documentElement.setAttribute('data-theme-preset', p)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
